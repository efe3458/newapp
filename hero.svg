<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EuroBridge — Catalog</title>
<link rel="icon" href="images/favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

<header class="site">
  <div class="container nav">
    <a class="logo" href="index.html"><img class="mark" src="images/logo.svg" alt="EuroBridge"> EuroBridge</a>
    <nav class="nav-links">
      <a href="album.html">Shop</a>
      <a href="index.html#how">How it works</a>
      <a href="index.html#shipping">Shipping</a>
      <a href="#">Track</a>
    </nav>
    <label class="search"><span>🔍</span><input type="search" placeholder="Search products, brands, stores…"></label>
    <div class="nav-actions">
      <div class="lang">
        <button class="lang-btn" id="langBtn">🌐 <span id="langLabel">EN</span> ▾</button>
        <div class="lang-menu" id="langMenu"></div>
      </div>
      <button class="icon-btn" title="Saved">♡</button>
      <button class="icon-btn" title="Cart">🛒<span class="cart-count" id="cartCount" style="display:none">0</span></button>
      <a class="btn btn-primary" href="#">Sign in</a>
    </div>
  </div>
</header>

<div class="container page-head">
  <div class="crumb">Home / Catalog</div>
  <h1>Catalog</h1>
</div>

<main class="container" style="padding-bottom:40px">
  <div class="catalog">
    <aside class="filters">
      <h4>Category</h4>
      <label><input type="checkbox"> Sneakers</label>
      <label><input type="checkbox"> Fashion</label>
      <label><input type="checkbox"> Tech</label>
      <label><input type="checkbox"> Home</label>
      <label><input type="checkbox"> Bags</label>
      <h4>Price</h4>
      <label><input type="radio" name="pr"> Under €20</label>
      <label><input type="radio" name="pr"> €20 – €50</label>
      <label><input type="radio" name="pr"> €50 – €100</label>
      <label><input type="radio" name="pr"> €100+</label>
      <h4>Color</h4>
      <div class="chips">
        <span class="chip">Black</span><span class="chip">White</span><span class="chip">Blue</span>
        <span class="chip">Beige</span><span class="chip">Pink</span>
      </div>
      <h4>Source</h4>
      <label><input type="checkbox"> Taobao</label>
      <label><input type="checkbox"> Weidian</label>
      <label><input type="checkbox"> 1688</label>
      <label><input type="checkbox"> Tmall</label>
    </aside>

    <section>
      <div class="toolbar">
        <span class="count">Showing 12 of 4,820 products</span>
        <select>
          <option>Sort: Recommended</option>
          <option>Price: Low to High</option>
          <option>Price: High to Low</option>
          <option>Newest</option>
          <option>Top rated</option>
        </select>
      </div>
      <div class="grid" id="catalog"></div>
    </section>
  </div>
</main>

<footer class="site">
  <div class="container">
    <div class="foot-bottom" style="border:0;padding-top:0"><span>© 2026 EuroBridge.</span><span>EN / DE / FR / ES / IT / + 22 more</span></div>
  </div>
</footer>

<script src="js/main.js"></script>
<script>
var CAT=[
  ['Retro Chunky Sneakers','p1','€38.90','€59.00','sale','4.8'],
  ['Cargo Tech Jacket','p2','€52.00','','new','4.7'],
  ['Wireless ANC Earbuds','p3','€24.50','€39.00','hot','4.6'],
  ['Mechanical Keyboard 75%','p4','€61.00','','new','4.9'],
  ['Leather Crossbody Bag','p5','€33.00','€48.00','sale','4.5'],
  ['Smart Fitness Watch S9','p6','€29.90','','hot','4.4'],
  ['Heavyweight Hoodie','p7','€27.00','€35.00','sale','4.8'],
  ['Desk Mat XXL + Pad','p8','€19.90','','new','4.7'],
  ['Retro Chunky Sneakers v2','p1','€41.00','','new','4.6'],
  ['Tech Jacket — Olive','p2','€49.00','€65.00','sale','4.7'],
  ['Earbuds — White','p3','€26.00','','hot','4.5'],
  ['Keyboard — Pink','p4','€63.00','','new','4.9']
];
function t(x){return x==='sale'?'<span class="pill pill-sale">SALE</span>':x==='new'?'<span class="pill pill-new">NEW</span>':'<span class="pill pill-hot">🔥 HOT</span>';}
document.getElementById('catalog').innerHTML=CAT.map(function(p){return '<article class="card"><div class="thumb"><img src="images/'+p[1]+'.svg" alt=""><div class="tags">'+t(p[4])+'</div><button class="save" data-save>♡</button></div><div class="body"><div class="name">'+p[0]+'</div><div class="rate">★ '+p[5]+'</div><div class="price"><span class="now">'+p[2]+'</span>'+(p[3]?'<span class="was">'+p[3]+'</span>':'')+'</div><button class="btn btn-ghost btn-block add" data-add>Add to Cart</button></div></article>';}).join('');
</script>
</body>
</html>
